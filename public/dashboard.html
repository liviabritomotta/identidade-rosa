<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdentidadeRosa | Dashboards</title>


    <link rel="stylesheet" href="./css/dashboards.css">
    <link rel="stylesheet" href="./css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <!-- scripts do Chart.js - 2022-1 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--FONT AWESOME-->
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>

<!-- <body onload=" atualizarFeed()"> -->

<body>

    <div class="janela">
        <div class="header-left">
            <h1>Identidade <span>Rosa</span></h1>

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>



            <div class="btn-logout" onclick="limparSessao()">
                <a href="index.html"></a>
                <h3>Sair</h3>
            </div>

        </div>

        <div class="dash">
            <div class="kpis">
                <div class="kpi">
                    <h3>80%</h3>
                    <p>das pessoas que acessam o quiz são criativas</p>
                </div>
                <div class="kpi">
                    <h3>18</h3>
                    <p>é a idade que mais acessa o site</p>
                </div>
                <div class="kpi">
                    <h3>exploradora</h3>
                    <p> top 1 no quiz</p>
                </div>
            </div>

            <div class="graficos">
                <div class="grafico">
                    <h3 class="titulo-grafico">Gráfico de dados do quiz</h3>
                    <div class="chart-container">
                        <canvas id="grafico1"></canvas>
                    </div>

                </div>

                <div class="grafico">
                    <h3 class="titulo-grafico">Como evoluiu a receita da Barbie ao longo dos anos?</h3>
                    <div class="chart-container">
                        <canvas id="grafico2"></canvas>
                    </div>

                </div>

            </div>

        </div>
    </div>


</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    let graficoPizza = null;

    function carregarGraficoQuiz() {
        fetch("/quiz/buscarResultados", {
            method: "GET"
        })
            .then(function (resposta) {
                return resposta.json();
            })
            .then(function (dados) {
                console.log(dados);

                var labelsGrafico = [];
                var valoresGrafico = [];

                for (var i = 0; i < dados.length; i++) {
                    labelsGrafico.push(dados[i].resultado);
                    valoresGrafico.push(dados[i].total);
                }

                const ctx = document.getElementById('grafico1');

                graficoPizza = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: labelsGrafico,
                        datasets: [{
                            label: 'Resultados do Quiz',
                            data: valoresGrafico,
                            backgroundColor: [
                                '#ff3399',
                                '#e60073',
                                '#ff80df',
                                ' #ff80bf',
                                '#ffb3d9',
                                '#ff1a66'
                            ],
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false
                    }
                });
            })
            .catch(function (erro) {
                console.log("Erro ao buscar dados do quiz:", erro);
            });
    }

    carregarGraficoQuiz();



    const ctx2 = document.getElementById('grafico2');

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['2000', '2005', '2010', '2015', '2020', '2025', '2026'],
            datasets: [{
                label: 'Receita gerada pela vendas de Barbie a cada 5 anos (em bilhões)',
                data: [1.9, 1.6, 1.2, 0.9, 1.2, 1.5, 1.6],
                backgroundColor: [
                    'rgb(255, 99, 132)'
                ],
                hoverOffset: 4
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
</script>
